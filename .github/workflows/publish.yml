name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ !github.event.release.draft && !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          release_tag="${{ github.event.release.tag_name }}"
          if [[ "$release_tag" != "v$package_version" ]]; then
            echo "Release tag $release_tag does not match package version v$package_version."
            exit 1
          fi

      - name: Check package is not already published
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          if npm view "@camden-lowrance/flow@$package_version" version >/dev/null 2>&1; then
            echo "@camden-lowrance/flow@$package_version is already published."
            exit 1
          fi

      - name: Check
        run: npm run check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Public readiness
        run: npm run readiness:public

      - name: Publish
        shell: bash
        run: |
          unset NODE_AUTH_TOKEN
          npm config delete //registry.npmjs.org/:_authToken --location=user || true
          npm publish --access public --provenance
