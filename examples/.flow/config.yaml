version: "1"
project:
  name: "example"

topology:
  repos:
    main:
      name: "example"
      baseBranch: "main"
    api:
      name: "example-api"
      baseBranch: "main"
      pathFromRoot: "services/api"
  branchPattern: "{kind}/{issueRef}-{slug}"
  pullRequestUrlPattern: "https://github.com/example-org/{repoName}/pull/{number}"
  issueInference:
    - repo: api
      keywords: ["api", "backend", "endpoint"]

issueTracker:
  type: "jira"
  siteUrl: "https://example.atlassian.net"
  projectKey: "EXAMPLE"

collaboration:
  type: "github"
  owner: "example-org"

sourceControl:
  type: "git"

ledger:
  type: "flow"

runtime:
  dashboard:
    customCssPath: ".flow/dashboard.css"
    defaultThemeId: "forest"
    defaultMode: "dark"
    themes:
      - id: "forest"
        name: "Forest"
        primary: "#6fb143"
        primaryDark: "#3f6f24"
        primaryFg: "#102108"
